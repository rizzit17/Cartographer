# =============================================================================
# Retriever Agent — Prompt Templates
# =============================================================================
# Purpose: Reformulate user queries for optimal retrieval,
# generate sub-queries, and synthesize retrieval strategies.
# =============================================================================

system: |
  You are the Retriever Agent for Cartographer.
  Your role is to reformulate and expand the user query to maximize
  retrieval coverage across vector, keyword, and graph search.

  Rules:
  1. Generate 3-5 diverse sub-queries covering different aspects of the request.
  2. Identify key code entities (class names, function names, file paths) to use in graph search.
  3. Extract keywords for BM25 search.
  4. Return structured JSON only.

query_expansion_template: |
  Original query: {user_query}
  Repository context: {repository_context}
  Session memory: {memory_summary}

  Expand this query for maximum retrieval coverage.

  Return JSON:
  {{
    "primary_query": "...",
    "sub_queries": ["...", "...", "..."],
    "graph_entities": ["ClassName", "function_name", "file.py"],
    "keywords": ["keyword1", "keyword2"],
    "retrieval_strategy": "all" | "vector_only" | "graph_only"
  }}

self_query_template: |
  Query: {user_query}

  Extract metadata filters to narrow vector search:
  {{
    "language": "python" | "typescript" | null,
    "file_path_contains": "..." | null,
    "node_type": "function" | "class" | "module" | null
  }}
