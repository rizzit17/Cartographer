# Alembic — Database Migration Configuration
# Cartographer Backend

[alembic]
script_location = migrations
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s
prepend_sys_path = .
truncate_slug_length = 40
revision_environment = false
sourceless = false
version_locations = %(here)s/migrations/versions
version_path_separator = os

# The sync DSN for migrations (asyncpg cannot be used with Alembic)
# Set via ALEMBIC_DATABASE_URL env var or computed from POSTGRES_* vars
sqlalchemy.url = %(ALEMBIC_DATABASE_URL)s

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
