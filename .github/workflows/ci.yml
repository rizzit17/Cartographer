name: Cartographer CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ---------------------------------------------------------------------------
  # Backend: Lint, Type Check, Test
  # ---------------------------------------------------------------------------
  backend-checks:
    name: Backend — Lint + Type + Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: cartographer_test
          POSTGRES_USER: cartographer
          POSTGRES_PASSWORD: test_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Format check (ruff)
        run: ruff format --check app tests

      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports || true

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://cartographer:test_secret@localhost:5432/cartographer_test
          ALEMBIC_DATABASE_URL: postgresql+psycopg2://cartographer:test_secret@localhost:5432/cartographer_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key-at-least-32-characters-long
          JWT_SECRET_KEY: test-jwt-secret-key-at-least-32-chars
          LLM_PROVIDER: openai
          EMBEDDING_PROVIDER: openai
          APP_ENV: test
        run: pytest --cov=app --cov-report=xml -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          flags: backend

  # ---------------------------------------------------------------------------
  # Frontend: Lint, Type Check, Test
  # ---------------------------------------------------------------------------
  frontend-checks:
    name: Frontend — Lint + Type + Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Run tests (Vitest)
        run: npm test -- --run

      - name: Build
        run: npm run build

  # ---------------------------------------------------------------------------
  # Build and Push Docker Images (main branch only)
  # ---------------------------------------------------------------------------
  build-push:
    name: Build + Push Docker Images
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    if: github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build + push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: production
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build + push sandbox
        uses: docker/build-push-action@v6
        with:
          context: ./infra/docker/sandbox
          file: ./infra/docker/sandbox/Dockerfile.sandbox
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
